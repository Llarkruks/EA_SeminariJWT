<div>
  <h2>Inicio</h2>
  <p>Has iniciado sesión correctamente</p>

  <div *ngIf="me" style="margin: 20px 0;">
    <h3>Información del usuario</h3>
    <p><strong>Nombre:</strong> {{ me.name }}</p>
    <p><strong>Email:</strong> {{ me.email }}</p>
    <p><strong>Rol:</strong> {{ me.rol }}</p>
  </div>

  <div style="margin: 20px 0;">
    <h3>Tu Token JWT</h3>
    <code style="display:block; padding:10px; background:#eee; word-break:break-all;">
      {{ tokenPreview }}
    </code>
  </div>

  <div style="margin: 20px 0;">
    <button class="btn" (click)="refreshToken()" style="margin-right: 10px;">
      Refrescar Token
    </button>

    <a *ngIf="esAdmin()" routerLink="/admin-resource" class="btn" style="text-decoration: none;">
      Ir al recurso de admin
    </a>
  </div>

  <div *ngIf="!esAdmin()" class="alert" style="margin-top: 10px;">
    Tu usuario no es admin, así que no verás el acceso al recurso protegido.
  </div>

  <button class="btn" (click)="logout()">
    Cerrar Sesión
  </button>
</div>
